    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --bg-color: #0f111a;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #00e6a8;
            --card-bg: #1e212b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: rgba(15, 17, 26, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: #ffffff;
        }

        h2 {
            color: var(--accent);
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin: 0;
        }

        section {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 35px 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        .highlight-text {
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--text-main);
            margin: 0;
        }

        .highlight-text strong {
            color: var(--accent);
            font-weight: 600;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
